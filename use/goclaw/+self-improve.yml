# Self-improve overlay for goclaw
# Mounts scripts and skills into the container
#
# Launch without entrypoint:
#   docker compose -f use/goclaw/service.goclaw.yml -f use/goclaw/+self-improve.yml run --rm goclaw /bin/goclaw version
#
# Full launch:
#   docker compose -f use/goclaw/service.goclaw.yml -f use/goclaw/+self-improve.yml up -d

services:
  goclaw:
    image: localhost/goclaw:current
    volumes:
      - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/goclaw:/bin/goclaw:ro
      - ${SELF_IMPROVE_DIR:-./use/self-improve}/sbin:/usr/local/sbin:ro
      - ${SELF_IMPROVE_DIR:-./use/self-improve}/skills/self-improve:/app/skills/self-improve:ro
    environment:
      - HOST_TASKS_DIR=/app/data/.runtime/sensible/tasks
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - CAP_DAC_OVERRIDE
