# User permission fix overlay — for rootless podman environments.
#
# Usage: Add to COMPOSE_FILE:
#   docker compose -f docker-compose.yml -f docker-compose.user-fix.yml up
#
# Fixes permission issues when running as non-root user (uid 1000)
# where container internal UIDs don't map correctly to host.

services:
